<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOS Keypoint Annotation Review</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: monospace; background: #1a1a2e; color: #eee; display: flex; height: 100vh; overflow: hidden; }

  #sidebar {
    width: 300px; min-width: 260px; background: #16213e; padding: 12px;
    display: flex; flex-direction: column; gap: 8px; overflow-y: auto;
    border-right: 2px solid #0f3460;
  }
  #sidebar h2 { font-size: 14px; color: #e94560; margin-bottom: 4px; }
  #sidebar label { font-size: 12px; display: block; margin-bottom: 2px; }
  #sidebar input[type="file"], #sidebar input[type="text"] {
    width: 100%; padding: 4px; font-size: 12px; background: #0f3460; color: #eee;
    border: 1px solid #533483; border-radius: 3px;
  }
  #sidebar button {
    padding: 6px 10px; font-size: 12px; cursor: pointer; border: none;
    border-radius: 3px; background: #533483; color: #eee;
  }
  #sidebar button:hover { background: #e94560; }
  #sidebar button.active { background: #e94560; }

  .image-list { flex: 1; overflow-y: auto; }
  .image-item {
    padding: 4px 8px; font-size: 11px; cursor: pointer; border-bottom: 1px solid #0f3460;
    display: flex; justify-content: space-between; align-items: center;
  }
  .image-item:hover { background: #0f3460; }
  .image-item.current { background: #533483; }
  .image-item .status { font-size: 10px; padding: 1px 4px; border-radius: 2px; }
  .status-pending { background: #444; }
  .status-accepted { background: #2d6a4f; }
  .status-corrected { background: #e9c46a; color: #000; }
  .status-flagged { background: #e94560; }

  #main {
    flex: 1; display: flex; flex-direction: column; position: relative;
  }
  #toolbar {
    padding: 8px 12px; background: #16213e; display: flex; gap: 8px;
    align-items: center; flex-wrap: wrap; border-bottom: 2px solid #0f3460;
  }
  #toolbar span { font-size: 12px; }
  #toolbar .sep { width: 1px; height: 20px; background: #533483; }
  kbd {
    display: inline-block; padding: 1px 5px; font-size: 11px;
    background: #0f3460; border: 1px solid #533483; border-radius: 2px;
  }

  #canvas-container {
    flex: 1; position: relative; overflow: hidden; cursor: crosshair;
  }
  #canvas-container canvas {
    position: absolute; top: 0; left: 0;
  }

  #role-legend {
    padding: 6px 12px; background: #16213e; display: flex; gap: 6px; flex-wrap: wrap;
    border-top: 2px solid #0f3460; font-size: 11px;
  }
  .legend-item { display: flex; align-items: center; gap: 3px; cursor: pointer; opacity: 0.6; }
  .legend-item.visible { opacity: 1.0; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  #info-bar {
    padding: 4px 12px; background: #0f3460; font-size: 11px;
    display: flex; justify-content: space-between;
  }

  .conf-badge {
    font-size: 9px; padding: 1px 4px; border-radius: 2px; margin-left: 4px;
    font-weight: bold;
  }
  .conf-high { background: #2d6a4f; color: #fff; }
  .conf-mid { background: #e9c46a; color: #000; }
  .conf-low { background: #e94560; color: #fff; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>MOS Keypoint Review</h2>

  <label>Images Directory (select any image):</label>
  <input type="file" id="image-input" multiple accept="image/*">

  <label>Labels Directory (select .txt files):</label>
  <input type="file" id="label-input" multiple accept=".txt">

  <label>Load Corrections JSON:</label>
  <input type="file" id="corrections-input" accept=".json">

  <label>Load Report JSON (confidence sort):</label>
  <input type="file" id="report-input" accept=".json">

  <div style="display: flex; gap: 4px; margin-top: 4px;">
    <button id="btn-export">Export Corrections</button>
    <button id="btn-merge">Merge to Labels</button>
  </div>

  <div style="display: flex; gap: 4px;">
    <button id="btn-prev">Prev</button>
    <button id="btn-next">Next</button>
    <button id="btn-sort-area">Sort by Area</button>
    <button id="btn-sort-conf">Sort by Confidence</button>
  </div>

  <div>
    <span style="font-size: 11px;">Filter:</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
    <button class="filter-btn" data-filter="flagged">Flagged</button>
  </div>

  <div class="image-list" id="image-list"></div>

  <div id="stats" style="font-size: 11px; padding-top: 4px; border-top: 1px solid #533483;">
    Images: 0 | Accepted: 0 | Corrected: 0 | Flagged: 0
  </div>
</div>

<div id="main">
  <div id="toolbar">
    <span>Image: <strong id="current-name">-</strong></span>
    <div class="sep"></div>
    <span><kbd>A</kbd> Accept</span>
    <span><kbd>F</kbd> Flag</span>
    <span><kbd>←</kbd><kbd>→</kbd> Navigate</span>
    <span><kbd>R</kbd> Reset corrections</span>
    <span><kbd>Delete</kbd> Delete selected keypoint</span>
    <div class="sep"></div>
    <span id="drag-info" style="color: #e9c46a;">Drag dots to correct</span>
  </div>

  <div id="canvas-container">
    <canvas id="bg-canvas"></canvas>
    <canvas id="overlay-canvas"></canvas>
  </div>

  <div id="role-legend"></div>
  <div id="info-bar">
    <span id="mouse-pos">-</span>
    <span id="kpt-info">-</span>
  </div>
</div>

<script>
// ---- Constants ----
const V2_ROLES = ["B1","C1","A1","A2","C3","C4","E1","D","B2","A3"];
const ROLE_COLORS = {
  B1: "#c3bef7", C1: "#98d8c8", A1: "#ffe66d", A2: "#a8e6cf",
  C3: "#ff8b94", C4: "#dcedc1", E1: "#ffd3b6", D: "#ffaaa5",
  B2: "#ff6b6b", A3: "#4ecdc4"
};
const ROLE_KPT_INDICES = {
  B1: [0, 1], C1: [2, 3], A1: [4, 5], A2: [6, 7], C3: [8, 9],
  C4: [10, 11], E1: [12, 13], D: [14, 15], B2: [16, 17], A3: [18, 19]
};
const NUM_KPT = 20;
const DOT_RADIUS = 6;
const DRAG_THRESHOLD = 10;

// ---- State ----
let images = {};        // name -> { url, width, height }
let labels = {};        // name -> Float64Array(60) [x,y,vis]*20 in YOLO 0-1 coords
let corrections = {};   // name -> Float64Array(60) or null
let statuses = {};      // name -> "pending" | "accepted" | "corrected" | "flagged"
let bboxes = {};        // name -> [cx, cy, w, h] in YOLO coords
let imageOrder = [];
let currentIndex = -1;
let currentFilter = "all";
let visibleRoles = new Set(V2_ROLES);
let reportData = null;     // pseudo_label_report.json data
let reportConfidence = {};  // name -> mean_kpt_conf

let dragKptIndex = -1;
let isDragging = false;
let imgDisplayRect = { x: 0, y: 0, w: 0, h: 0 };
let loadedImg = null;

const bgCanvas = document.getElementById("bg-canvas");
const olCanvas = document.getElementById("overlay-canvas");
const bgCtx = bgCanvas.getContext("2d");
const olCtx = olCanvas.getContext("2d");
const container = document.getElementById("canvas-container");

// ---- File Loading ----
document.getElementById("image-input").addEventListener("change", async (e) => {
  const files = Array.from(e.target.files);
  for (const f of files) {
    const url = URL.createObjectURL(f);
    const name = f.name.replace(/\.[^.]+$/, "");
    images[name] = { url, file: f };
  }
  rebuildImageOrder();
  if (currentIndex < 0 && imageOrder.length > 0) selectImage(0);
});

document.getElementById("label-input").addEventListener("change", async (e) => {
  const files = Array.from(e.target.files);
  for (const f of files) {
    const name = f.name.replace(/\.txt$/, "");
    const text = await f.text();
    const parsed = parseYoloPoseLine(text.trim());
    if (parsed) {
      labels[name] = parsed.kpts;
      bboxes[name] = parsed.bbox;
      if (!statuses[name]) statuses[name] = "pending";
    }
  }
  rebuildImageOrder();
  render();
});

document.getElementById("corrections-input").addEventListener("change", async (e) => {
  const f = e.target.files[0];
  if (!f) return;
  const data = JSON.parse(await f.text());
  for (const [name, entry] of Object.entries(data)) {
    if (entry.keypoints) {
      corrections[name] = new Float64Array(entry.keypoints);
    }
    if (entry.status) {
      statuses[name] = entry.status;
    }
  }
  rebuildImageOrder();
  render();
});

document.getElementById("report-input").addEventListener("change", async (e) => {
  const f = e.target.files[0];
  if (!f) return;
  reportData = JSON.parse(await f.text());
  reportConfidence = {};
  if (reportData.per_image) {
    for (const entry of reportData.per_image) {
      const baseName = entry.stem || "";
      reportConfidence[baseName] = entry.mean_kpt_conf || 0;
    }
  }
  // Auto-sort by confidence ascending (worst first)
  imageOrder.sort((a, b) => {
    const ca = reportConfidence[a] !== undefined ? reportConfidence[a] : 1;
    const cb = reportConfidence[b] !== undefined ? reportConfidence[b] : 1;
    return ca - cb;
  });
  renderImageList();
  if (imageOrder.length > 0) selectImage(0);
});

function parseYoloPoseLine(line) {
  if (!line) return null;
  const parts = line.split(/\s+/).map(Number);
  if (parts.length < 5 + NUM_KPT * 3) return null;
  const bbox = [parts[1], parts[2], parts[3], parts[4]];
  const kpts = new Float64Array(NUM_KPT * 3);
  for (let i = 0; i < NUM_KPT; i++) {
    kpts[i * 3] = parts[5 + i * 3];
    kpts[i * 3 + 1] = parts[5 + i * 3 + 1];
    kpts[i * 3 + 2] = parts[5 + i * 3 + 2];
  }
  return { bbox, kpts };
}

// ---- Image List ----
function rebuildImageOrder() {
  const allNames = [...new Set([...Object.keys(images), ...Object.keys(labels)])];
  allNames.sort();
  imageOrder = allNames.filter(name => {
    if (currentFilter === "all") return true;
    return (statuses[name] || "pending") === currentFilter;
  });
  renderImageList();
  updateStats();
}

function renderImageList() {
  const list = document.getElementById("image-list");
  list.innerHTML = "";
  imageOrder.forEach((name, idx) => {
    const item = document.createElement("div");
    item.className = "image-item" + (idx === currentIndex ? " current" : "");
    const status = statuses[name] || "pending";
    let confBadge = "";
    if (reportConfidence[name] !== undefined) {
      const conf = reportConfidence[name];
      const cls = conf >= 0.8 ? "conf-high" : conf >= 0.65 ? "conf-mid" : "conf-low";
      confBadge = `<span class="conf-badge ${cls}">${conf.toFixed(2)}</span>`;
    }
    item.innerHTML = `<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span>${confBadge}<span class="status status-${status}">${status}</span>`;
    item.addEventListener("click", () => selectImage(idx));
    list.appendChild(item);
  });
}

function updateStats() {
  const allNames = [...new Set([...Object.keys(images), ...Object.keys(labels)])];
  const counts = { accepted: 0, corrected: 0, flagged: 0 };
  for (const name of allNames) {
    const s = statuses[name] || "pending";
    if (counts[s] !== undefined) counts[s]++;
  }
  document.getElementById("stats").textContent =
    `Images: ${allNames.length} | Accepted: ${counts.accepted} | Corrected: ${counts.corrected} | Flagged: ${counts.flagged}`;
}

// ---- Navigation ----
function selectImage(idx) {
  if (idx < 0 || idx >= imageOrder.length) return;
  currentIndex = idx;
  const name = imageOrder[idx];
  document.getElementById("current-name").textContent = name;

  const imgData = images[name];
  if (imgData) {
    const img = new Image();
    img.onload = () => {
      loadedImg = img;
      imgData.width = img.naturalWidth;
      imgData.height = img.naturalHeight;
      resizeCanvases();
      render();
    };
    img.src = imgData.url;
  } else {
    loadedImg = null;
    render();
  }
  renderImageList();
}

function nextImage() {
  if (currentIndex < imageOrder.length - 1) selectImage(currentIndex + 1);
}
function prevImage() {
  if (currentIndex > 0) selectImage(currentIndex - 1);
}

// ---- Canvas ----
function resizeCanvases() {
  const rect = container.getBoundingClientRect();
  bgCanvas.width = rect.width;
  bgCanvas.height = rect.height;
  olCanvas.width = rect.width;
  olCanvas.height = rect.height;
}

window.addEventListener("resize", () => {
  resizeCanvases();
  render();
});

function getDisplayRect() {
  if (!loadedImg) return { x: 0, y: 0, w: 0, h: 0 };
  const cw = bgCanvas.width;
  const ch = bgCanvas.height;
  const iw = loadedImg.naturalWidth;
  const ih = loadedImg.naturalHeight;
  const scale = Math.min(cw / iw, ch / ih, 1.0);
  const dw = iw * scale;
  const dh = ih * scale;
  return { x: (cw - dw) / 2, y: (ch - dh) / 2, w: dw, h: dh };
}

function render() {
  resizeCanvases();
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  olCtx.clearRect(0, 0, olCanvas.width, olCanvas.height);

  if (!loadedImg) return;

  imgDisplayRect = getDisplayRect();
  const { x, y, w, h } = imgDisplayRect;

  bgCtx.drawImage(loadedImg, x, y, w, h);

  const name = imageOrder[currentIndex];
  if (!name) return;

  const kpts = corrections[name] || labels[name];
  if (!kpts) return;

  // Draw lines + dots for each visible role
  for (const role of V2_ROLES) {
    if (!visibleRoles.has(role)) continue;
    const [i1, i2] = ROLE_KPT_INDICES[role];
    const v1 = kpts[i1 * 3 + 2];
    const v2 = kpts[i2 * 3 + 2];
    if (v1 === 0 && v2 === 0) continue;

    const color = ROLE_COLORS[role];

    const px1 = x + kpts[i1 * 3] * w;
    const py1 = y + kpts[i1 * 3 + 1] * h;
    const px2 = x + kpts[i2 * 3] * w;
    const py2 = y + kpts[i2 * 3 + 1] * h;

    // Line
    if (v1 > 0 && v2 > 0) {
      olCtx.beginPath();
      olCtx.moveTo(px1, py1);
      olCtx.lineTo(px2, py2);
      olCtx.strokeStyle = color;
      olCtx.lineWidth = 2;
      olCtx.stroke();
    }

    // Dots
    if (v1 > 0) drawDot(px1, py1, color, i1);
    if (v2 > 0) drawDot(px2, py2, color, i2);

    // Label
    if (v1 > 0 || v2 > 0) {
      const lx = (v1 > 0 && v2 > 0) ? (px1 + px2) / 2 : (v1 > 0 ? px1 : px2);
      const ly = (v1 > 0 && v2 > 0) ? (px1 !== px2 ? Math.min(py1, py2) - 12 : (py1 + py2) / 2 - 12) : (v1 > 0 ? py1 - 12 : py2 - 12);
      olCtx.font = "bold 11px monospace";
      olCtx.fillStyle = color;
      olCtx.textAlign = "center";
      olCtx.fillText(role, lx, ly);
    }
  }

  // Highlight dragged keypoint
  if (dragKptIndex >= 0) {
    const kx = x + kpts[dragKptIndex * 3] * w;
    const ky = y + kpts[dragKptIndex * 3 + 1] * h;
    olCtx.beginPath();
    olCtx.arc(kx, ky, DOT_RADIUS + 3, 0, Math.PI * 2);
    olCtx.strokeStyle = "#fff";
    olCtx.lineWidth = 2;
    olCtx.stroke();
  }
}

function drawDot(px, py, color, kptIdx) {
  olCtx.beginPath();
  olCtx.arc(px, py, DOT_RADIUS, 0, Math.PI * 2);
  olCtx.fillStyle = color;
  olCtx.fill();
  olCtx.strokeStyle = "#000";
  olCtx.lineWidth = 1;
  olCtx.stroke();

  // Tiny index label
  olCtx.font = "8px monospace";
  olCtx.fillStyle = "#000";
  olCtx.textAlign = "center";
  olCtx.fillText(String(kptIdx), px, py + 3);
}

// ---- Mouse Interaction ----
function canvasToKptCoord(canvasX, canvasY) {
  const { x, y, w, h } = imgDisplayRect;
  return {
    kx: (canvasX - x) / Math.max(1, w),
    ky: (canvasY - y) / Math.max(1, h)
  };
}

function findNearestKpt(canvasX, canvasY) {
  const name = imageOrder[currentIndex];
  if (!name) return -1;
  const kpts = corrections[name] || labels[name];
  if (!kpts) return -1;

  const { x, y, w, h } = imgDisplayRect;
  let bestIdx = -1;
  let bestDist = DRAG_THRESHOLD * DRAG_THRESHOLD;

  for (let i = 0; i < NUM_KPT; i++) {
    if (kpts[i * 3 + 2] === 0) continue;
    const px = x + kpts[i * 3] * w;
    const py = y + kpts[i * 3 + 1] * h;
    const dx = canvasX - px;
    const dy = canvasY - py;
    const dist = dx * dx + dy * dy;
    if (dist < bestDist) {
      bestDist = dist;
      bestIdx = i;
    }
  }
  return bestIdx;
}

olCanvas.addEventListener("mousedown", (e) => {
  const rect = olCanvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  dragKptIndex = findNearestKpt(cx, cy);
  if (dragKptIndex >= 0) isDragging = true;
});

olCanvas.addEventListener("mousemove", (e) => {
  const rect = olCanvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const { kx, ky } = canvasToKptCoord(cx, cy);
  document.getElementById("mouse-pos").textContent =
    `Pos: (${(kx * 1000).toFixed(1)}, ${(ky * 1000).toFixed(1)}) MOS`;

  if (isDragging && dragKptIndex >= 0) {
    const name = imageOrder[currentIndex];
    if (!name) return;
    ensureCorrections(name);
    const kpts = corrections[name];
    kpts[dragKptIndex * 3] = Math.max(0, Math.min(1, kx));
    kpts[dragKptIndex * 3 + 1] = Math.max(0, Math.min(1, ky));
    render();
  } else {
    const nearIdx = findNearestKpt(cx, cy);
    if (nearIdx >= 0) {
      const role = findRoleForKpt(nearIdx);
      document.getElementById("kpt-info").textContent = `Keypoint ${nearIdx} (${role || "?"})`;
      olCanvas.style.cursor = "grab";
    } else {
      document.getElementById("kpt-info").textContent = "-";
      olCanvas.style.cursor = "crosshair";
    }
  }
});

olCanvas.addEventListener("mouseup", () => {
  if (isDragging && dragKptIndex >= 0) {
    const name = imageOrder[currentIndex];
    if (name && corrections[name]) {
      statuses[name] = "corrected";
      updateStats();
      renderImageList();
    }
  }
  isDragging = false;
  dragKptIndex = -1;
  render();
});

olCanvas.addEventListener("mouseleave", () => {
  isDragging = false;
  dragKptIndex = -1;
});

function findRoleForKpt(idx) {
  for (const [role, [i1, i2]] of Object.entries(ROLE_KPT_INDICES)) {
    if (idx === i1 || idx === i2) return role;
  }
  return null;
}

function ensureCorrections(name) {
  if (!corrections[name]) {
    const src = labels[name];
    if (src) {
      corrections[name] = new Float64Array(src);
    } else {
      corrections[name] = new Float64Array(NUM_KPT * 3);
    }
  }
}

// ---- Keyboard Shortcuts ----
document.addEventListener("keydown", (e) => {
  const name = imageOrder[currentIndex];
  switch (e.key) {
    case "a":
    case "A":
      if (name) {
        statuses[name] = "accepted";
        updateStats();
        renderImageList();
        nextImage();
      }
      break;
    case "f":
    case "F":
      if (name) {
        statuses[name] = "flagged";
        updateStats();
        renderImageList();
        nextImage();
      }
      break;
    case "r":
    case "R":
      if (name) {
        delete corrections[name];
        statuses[name] = "pending";
        updateStats();
        renderImageList();
        render();
      }
      break;
    case "ArrowRight":
      e.preventDefault();
      nextImage();
      break;
    case "ArrowLeft":
      e.preventDefault();
      prevImage();
      break;
    case "Delete":
    case "Backspace":
      if (name && dragKptIndex < 0) {
        // Find nearest keypoint under last mouse position and delete it
        // For now, this is handled via drag context
      }
      break;
  }
});

// ---- Buttons ----
document.getElementById("btn-prev").addEventListener("click", prevImage);
document.getElementById("btn-next").addEventListener("click", nextImage);

document.getElementById("btn-sort-area").addEventListener("click", () => {
  // Sort by putting images with labels with lowest bbox area first
  imageOrder.sort((a, b) => {
    const ba = bboxes[a];
    const bb = bboxes[b];
    const areaA = ba ? ba[2] * ba[3] : 1;
    const areaB = bb ? bb[2] * bb[3] : 1;
    return areaA - areaB;
  });
  renderImageList();
  if (imageOrder.length > 0) selectImage(0);
});

document.getElementById("btn-sort-conf").addEventListener("click", () => {
  if (Object.keys(reportConfidence).length === 0) {
    alert("Load a pseudo_label_report.json first.");
    return;
  }
  imageOrder.sort((a, b) => {
    const ca = reportConfidence[a] !== undefined ? reportConfidence[a] : 1;
    const cb = reportConfidence[b] !== undefined ? reportConfidence[b] : 1;
    return ca - cb;
  });
  renderImageList();
  if (imageOrder.length > 0) selectImage(0);
});

document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    rebuildImageOrder();
    if (imageOrder.length > 0) selectImage(0);
  });
});

// ---- Export / Merge ----
document.getElementById("btn-export").addEventListener("click", () => {
  const data = {};
  const allNames = [...new Set([...Object.keys(images), ...Object.keys(labels)])];
  for (const name of allNames) {
    const status = statuses[name] || "pending";
    const entry = { status };
    if (corrections[name]) {
      entry.keypoints = Array.from(corrections[name]);
    }
    data[name] = entry;
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "corrections.json";
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById("btn-merge").addEventListener("click", () => {
  // Generate merged YOLO-Pose .txt labels as a ZIP-like download (one file per image)
  const allNames = [...new Set([...Object.keys(images), ...Object.keys(labels)])];
  let mergedCount = 0;
  const lines = [];
  for (const name of allNames) {
    const kpts = corrections[name] || labels[name];
    const bbox = bboxes[name];
    if (!kpts || !bbox) continue;
    const parts = ["0"];
    parts.push(...bbox.map(v => v.toFixed(6)));
    for (let i = 0; i < NUM_KPT; i++) {
      parts.push(kpts[i * 3].toFixed(6), kpts[i * 3 + 1].toFixed(6), String(kpts[i * 3 + 2]));
    }
    lines.push({ name, line: parts.join(" ") });
    mergedCount++;
  }

  // Download as a single JSON with filename->label+status mapping (easier to handle in Python)
  const output = {};
  for (const { name, line } of lines) {
    output[name] = { label: line, status: statuses[name] || "pending" };
  }
  const blob = new Blob([JSON.stringify(output, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "merged_labels.json";
  a.click();
  URL.revokeObjectURL(url);
  alert(`Exported ${mergedCount} merged labels.`);
});

// ---- Legend ----
function buildLegend() {
  const el = document.getElementById("role-legend");
  el.innerHTML = "";
  for (const role of V2_ROLES) {
    const item = document.createElement("div");
    item.className = "legend-item" + (visibleRoles.has(role) ? " visible" : "");
    item.innerHTML = `<div class="legend-dot" style="background:${ROLE_COLORS[role]}"></div><span>${role}</span>`;
    item.addEventListener("click", () => {
      if (visibleRoles.has(role)) visibleRoles.delete(role);
      else visibleRoles.add(role);
      item.classList.toggle("visible");
      render();
    });
    el.appendChild(item);
  }
}
buildLegend();

// Initial resize
setTimeout(() => { resizeCanvases(); render(); }, 100);
</script>
